# config.yaml
server:
  read_timeout: 15
  write_timeout: 15
  idle_timeout: 60

database:
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime_minutes: 5

logging:
  format: "text"  # text or json
  include_request_body: false

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"