version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: subscription_postgres
    environment:
      POSTGRES_DB: subscriptiondb
      POSTGRES_USER: subscriptionuser
      POSTGRES_PASSWORD: subscriptionpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - subscription_network

  app:
    build: .
    container_name: subscription_app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      # Environment variables override config files
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: subscriptionuser
      DB_PASSWORD: subscriptionpass
      DB_NAME: subscriptiondb
      SERVER_PORT: 8080
      APP_ENV: production
    volumes:
      - ./config.yaml:/app/config.yaml  # Mount config file
      - ./.env:/app/.env                 # Mount env file
      - ./migrations:/app/migrations
    networks:
      - subscription_network

networks:
  subscription_network:
    driver: bridge

volumes:
  postgres_data: