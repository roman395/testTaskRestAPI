definitions:
  api_internal_models.CreateSubscriptionInput:
    properties:
      end_date:
        example: 12-2025
        type: string
      price:
        example: 400
        type: integer
      service_name:
        example: Yandex Plus
        type: string
      start_date:
        example: 07-2025
        type: string
      user_id:
        example: 60601fee-2bf1-4721-ae6f-7636e79a0cba
        type: string
    required:
    - price
    - service_name
    - start_date
    - user_id
    type: object
  api_internal_models.Subscription:
    properties:
      end_date:
        example: 12-2024
        type: string
      id:
        example: 1
        type: integer
      price:
        example: 599
        type: integer
      service_name:
        example: Netflix
        type: string
      start_date:
        example: 01-2024
        type: string
      user_id:
        example: 60601fee-2bf1-4721-ae6f-7636e79a0cba
        type: string
    type: object
  api_internal_models.UpdateSubscriptionInput:
    properties:
      end_date:
        example: 12-2024
        type: string
      price:
        example: 649
        type: integer
      service_name:
        example: Netflix Premium
        type: string
      start_date:
        example: 01-2024
        type: string
      user_id:
        example: 60601fee-2bf1-4721-ae6f-7636e79a0cba
        type: string
